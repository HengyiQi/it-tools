about:
  content: >
    # 袩褉芯 IT-Tools

    笑械泄 褔褍写芯胁懈泄 胁械斜褋邪泄褌, 褋褌胁芯褉械薪懈泄 蟹 鉂?[Corentin Thomasset](https://corentin.tech?utm_source=it-tools&utm_medium=about), 邪谐褉械谐褍褦 泻芯褉懈褋薪褨 褨薪褋褌褉褍屑械薪褌懈 写谢褟 褉芯蟹褉芯斜薪懈泻褨胁 褨 谢褞写械泄, 褟泻褨 锌褉邪褑褞褞褌褜 胁 褋褎械褉褨 IT. 携泻褖芯 胁邪屑 褑械 泻芯褉懈褋薪芯, 斜褍写褜 谢邪褋泻邪, 锌芯写褨谢褨褌褜褋褟 褑懈屑 蟹 谢褞写褜屑懈, 褟泻褨, 薪邪 胁邪褕褍 写褍屑泻褍, 褌邪泻芯卸 屑芯卸褍褌褜 蟹薪邪泄褌懈 泄芯谐芯 泻芯褉懈褋薪懈屑, 褨 薪械 蟹邪斜褍写褜褌械 写芯写邪褌懈 泄芯谐芯 写芯 蟹邪泻谢邪写芯泻 褍 胁邪褕褨泄 锌邪薪械谢褨 褕胁懈写泻芯谐芯 写芯褋褌褍锌褍!

    IT Tools 褦 胁褨写泻褉懈褌懈屑 锌褉芯谐褉邪屑薪懈屑 蟹邪斜械蟹锌械褔械薪薪褟屑 (锌褨写 谢褨褑械薪蟹褨褦褞 GPL-3.0) 褨 斜械蟹泻芯褕褌芯胁薪懈屑, 褨 蟹邪胁卸写懈 斜褍写械 褌邪泻懈屑, 邪谢械 屑械薪褨 泻芯褕褌褍褦 谐褉芯褕褨 写谢褟 褏芯褋褌懈薪谐褍 褨 锌褉芯写芯胁卸械薪薪褟 写芯屑械薪薪芯谐芯 褨屑械薪褨. 携泻褖芯 胁懈 褏芯褔械褌械 锌褨写褌褉懈屑邪褌懈 屑芯褞 褉芯斜芯褌褍 褨 锌褨写褌褉懈屑邪褌懈 屑械薪械 褍 写芯写邪胁邪薪薪褨 薪芯胁懈褏 褨薪褋褌褉褍屑械薪褌褨胁, 褉芯蟹谐谢褟薪褜褌械 屑芯卸谢懈胁褨褋褌褜 锌褨写褌褉懈屑泻懈, [褋锌芯薪褋芯褉褍褞褔懈 屑械薪械](https://www.buymeacoffee.com/cthmsst).

    ## 孝械褏薪芯谢芯谐褨褩

    IT Tools 胁懈泻芯薪邪薪懈泄 薪邪 Vue.js (Vue 3) 蟹 胁懈泻芯褉懈褋褌邪薪薪褟屑 斜褨斜谢褨芯褌械泻懈 泻芯屑锌芯薪械薪褌褨胁 Naive UI 褨 褉芯蟹谐芯褉褌邪薪懈泄 蟹邪 写芯锌芯屑芯谐芯褞 Vercel. 校 写械褟泻懈褏 褨薪褋褌褉褍屑械薪褌邪褏 胁懈泻芯褉懈褋褌芯胁褍褞褌褜褋褟 褋褌芯褉芯薪薪褨 胁褨写泻褉懈褌褨 斜褨斜谢褨芯褌械泻懈, 锌芯胁薪懈泄 褋锌懈褋芯泻 褟泻懈褏 胁懈 屑芯卸械褌械 蟹薪邪泄褌懈 胁 褎邪泄谢褨 [package.json](https://github.com/CorentinTh/it-tools/blob/main/package.json) 褉械锌芯蟹懈褌芯褉褨褞.

    ## 袟薪邪泄褕谢懈 斜邪谐? 袙褨写褋褍褌薪褨泄 褨薪褋褌褉褍屑械薪褌?

    携泻褖芯 胁邪屑 锌芯褌褉褨斜械薪 褨薪褋褌褉褍屑械薪褌, 褟泻芯谐芯 薪邪褉邪蟹褨 薪械屑邪褦 褌褍褌, 褨 胁懈 胁胁邪卸邪褦褌械, 褖芯 胁褨薪 屑芯卸械 斜褍褌懈 泻芯褉懈褋薪懈屑, 胁懈 屑芯卸械褌械 锌芯写邪褌懈 蟹邪锌懈褌 薪邪 写芯写邪胁邪薪薪褟 褎褍薪泻褑褨褩 胁 [褉芯蟹写褨谢褨 锌褉芯斜谢械屑](https://github.com/CorentinTh/it-tools/issues/new/choose) 褍 褉械锌芯蟹懈褌芯褉褨褩 GitHub.

    袗 褟泻褖芯 胁懈 蟹薪邪泄褕谢懈 斜邪谐 邪斜芯 褖芯褋褜 薪械 锌褉邪褑褞褦, 褟泻 芯褔褨泻褍胁邪谢芯褋褟, 斜褍写褜 谢邪褋泻邪, 锌芯写邪泄褌械 蟹胁褨褌 锌褉芯 斜邪谐 胁 [褉芯蟹写褨谢褨 锌褉芯斜谢械屑](https://github.com/CorentinTh/it-tools/issues/new/choose) 褍 褉械锌芯蟹懈褌芯褉褨褩 GitHub.

